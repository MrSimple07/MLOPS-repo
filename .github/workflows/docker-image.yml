name: Docker CI

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Debug
      run: |
        ls -la
        pwd
        find . -name Dockerfile

    - name: Build Docker image
      working-directory: .
      run: docker build . -t pizza-quality-service:latest