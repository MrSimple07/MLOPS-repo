name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]  # Запускать пайплайн при пуше в ветку main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: |
        pytest

  build-and-push:
    needs: test # Этот шаг начнется ТОЛЬКО если тесты прошли успешно
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: actions/workflow-apps/.github@v4 # Настройка сборщика

    # Шаги авторизации в Docker Hub (для учебного проекта можно закомментировать)
    # - name: Log in to Docker Hub
    #   uses: docker/login-action@v3
    #   with:
    #     username: ${{ secrets.DOCKERHUB_USERNAME }}
    #     password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Docker Image
      run: |
        docker build -t pizza-quality-service:latest .